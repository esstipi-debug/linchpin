# Fly.io app config for the Inventory Planner webapp + read-only MCP server.
#
# `app`/`primary_region` below are placeholders - `fly launch` (run from this
# repo, picks up the Dockerfile + this file automatically) will either offer to
# reuse them or prompt you for real ones; alternatively run `fly apps create
# <your-app-name>` first and edit `app` below to match before `fly deploy`.
# Not independently verified step-by-step against a live Fly account this
# session (no Fly CLI/account access here) - sanity-check this file against
# `fly launch`'s actual current prompts before trusting it blindly.

app = "linchpin"                # CHANGE ME: must be globally unique on Fly.io
primary_region = "iad"          # CHANGE ME: pick the region closest to your users

[build]

[env]
  LINCHPIN_ENV = "production"
  LINCHPIN_LOG_JSON = "1"
  LINCHPIN_MCP_KEYS_PATH = "/app/data/mcp_keys.sqlite3"

# Persists the two SQLite stores (MCP key store + writeback audit ledger)
# across redeploys - Fly Machines' root filesystem is otherwise ephemeral.
# Create once: `fly volumes create linchpin_data --size 1 --region <primary_region>`
[[mounts]]
  source = "linchpin_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
