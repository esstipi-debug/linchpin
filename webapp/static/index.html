<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory Planner</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Design tokens are the console's, verbatim (webapp/static/prototype/index.html),
     so / and /console share one visual language. app.js mirrors the chart-only
     colors in a JS object because CSS var() can't resolve in SVG presentation attrs. */
  :root{
    --ink:#080b11; --ink-2:#0d1219; --head:#0f1620;
    --panel:#111722; --panel-2:#0f141d;
    --line:#1e2733; --line-2:#283341; --track:#1e2733;
    --txt:#e7eef6; --txt-2:#c4cfdb; --muted:#9aa7b6; --faint:#5e6b7a;
    --accent:#4fd1c5; --accent-bright:#5eead4; --accent-dim:#1c3b39;
    --accent-soft:rgba(79,209,197,.14); --accent-bd:rgba(79,209,197,.45);
    --accent-bar:rgba(79,209,197,.92); --accent2-bar:rgba(94,234,212,.62);
    --ok:#3fb950; --warn:#d4a017; --bad:#f0564a;
    --ok-soft:rgba(63,185,80,.12); --ok-bd:rgba(63,185,80,.4);
    --warn-soft:rgba(212,160,23,.12); --warn-bd:rgba(212,160,23,.4);
    --bad-soft:rgba(240,86,74,.12); --bad-bd:rgba(240,86,74,.42);
    --r-card:14px; --r-tile:12px; --r-field:11px; --r-chip:999px;
    --shadow:0 18px 50px -22px rgba(0,0,0,.7),0 2px 8px -2px rgba(0,0,0,.5);
    --shadow-sm:0 1px 3px rgba(0,0,0,.4);
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    background:var(--ink);
    color:var(--txt);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.4;
    background-image:
      radial-gradient(1100px 520px at 12% -8%, rgba(79,209,197,.10), transparent 60%),
      radial-gradient(900px 600px at 108% 0%, rgba(120,90,255,.06), transparent 55%);
    background-attachment:fixed;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp .25s cubic-bezier(0.16,1,0.3,1) both}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#33414f}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:var(--line-2);outline:none}
  input[type=range]:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--ink)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--ink)}
  button{font-family:inherit}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  tr[data-row]:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  tr[data-row]:hover{background:rgba(79,209,197,.045)}
  [role="tab"][aria-selected="false"]:hover{color:var(--txt-2)}
</style>
</head>
<body>
<div id="sr-status" aria-live="polite" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0"></div>
<a href="/console" aria-label="Open the agent console"
   style="position:fixed;bottom:18px;right:18px;z-index:50;display:flex;align-items:center;gap:7px;font:600 12.5px/1 'JetBrains Mono',ui-monospace,monospace;color:var(--ink);text-decoration:none;background:linear-gradient(150deg,var(--accent-bright),var(--accent));padding:11px 16px;border-radius:999px;box-shadow:0 10px 26px -10px rgba(79,209,197,.6);transition:transform .15s,box-shadow .15s"
   onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 16px 34px -10px rgba(79,209,197,.85)'"
   onmouseout="this.style.transform='none';this.style.boxShadow='0 10px 26px -10px rgba(79,209,197,.6)'">◈ Agent console →</a>
<div id="root" style="min-height:100vh"></div>
<script src="/static/app.js?v=2"></script>
</body>
</html>
