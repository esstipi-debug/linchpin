<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:oklch(15% 0.01 260);
    color:oklch(94% 0 0);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.4;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp .25s cubic-bezier(0.16,1,0.3,1) both}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:oklch(34% 0.012 260);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:oklch(40% 0.012 260)}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:oklch(30% 0.012 260);outline:none}
  input[type=range]:focus-visible{outline:2px solid oklch(70% 0.16 250);outline-offset:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:oklch(70% 0.16 250);cursor:pointer;border:2px solid oklch(20% 0.01 260)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:oklch(70% 0.16 250);cursor:pointer;border:2px solid oklch(20% 0.01 260)}
  button{font-family:inherit}
  button:focus-visible{outline:2px solid oklch(70% 0.16 250);outline-offset:2px}
  tr[data-row]:focus-visible{outline:2px solid oklch(70% 0.16 250);outline-offset:-2px}
</style>
</head>
<body>
<div id="sr-status" aria-live="polite" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0"></div>
<div id="root" style="min-height:100vh"></div>
<script src="/static/app.js"></script>
</body>
</html>
