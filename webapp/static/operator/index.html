<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portafolio del Operador · Linchpin</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Design tokens borrowed from the dashboard (webapp/static/index.html) so the
     portfolio shares Linchpin's visual language. */
  :root{
    --ink:#080b11; --ink-2:#0d1219; --head:#0f1620;
    --panel:#111722; --panel-2:#0f141d;
    --line:#1e2733; --line-2:#283341;
    --txt:#e7eef6; --txt-2:#c4cfdb; --muted:#9aa7b6; --faint:#5e6b7a;
    --accent:#4fd1c5; --accent-bright:#5eead4; --accent-dim:#1c3b39;
    --accent-soft:rgba(79,209,197,.14); --accent-bd:rgba(79,209,197,.45);
    --ok:#3fb950; --warn:#d4a017; --bad:#f0564a;
    --sans:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --r:14px; --shadow:0 18px 50px -22px rgba(0,0,0,.7),0 2px 8px -2px rgba(0,0,0,.5);
    --sidebar-w:312px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--ink); color:var(--txt);
    font-family:var(--sans); font-size:15.5px; line-height:1.65;
    background-image:radial-gradient(900px 600px at 12% -8%,rgba(79,209,197,.06),transparent 60%);
    background-attachment:fixed;
  }
  a{color:var(--accent-bright); text-decoration:none}
  a:hover{text-decoration:underline}

  .layout{display:grid; grid-template-columns:var(--sidebar-w) minmax(0,1fr); min-height:100vh}

  /* ---- Sidebar ---- */
  .sidebar{
    position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto;
    background:linear-gradient(180deg,var(--head),var(--panel-2));
    border-right:1px solid var(--line); padding:26px 18px 32px;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:0 8px 4px}
  .brand .mark{font-size:20px}
  .brand h1{font-size:15px; margin:0; letter-spacing:.2px; font-weight:800}
  .brand .sub{display:block; font-size:11.5px; color:var(--muted); font-weight:500; letter-spacing:.3px; text-transform:uppercase}
  .nav{margin-top:22px; display:flex; flex-direction:column; gap:3px}
  .nav a{
    display:flex; gap:11px; align-items:baseline; padding:9px 12px; border-radius:10px;
    color:var(--txt-2); font-size:13.7px; font-weight:500; border:1px solid transparent;
  }
  .nav a:hover{background:var(--panel); color:var(--txt); text-decoration:none}
  .nav a.active{background:var(--accent-soft); border-color:var(--accent-bd); color:var(--accent-bright); font-weight:600}
  .nav a .n{font-family:var(--mono); font-size:11.5px; color:var(--faint); min-width:18px}
  .nav a.active .n{color:var(--accent)}
  .side-foot{margin-top:26px; padding:14px 12px 0; border-top:1px solid var(--line); font-size:12px; color:var(--faint)}
  .side-foot a{color:var(--muted)}

  /* ---- Content ---- */
  main{padding:0; min-width:0}
  .topbar{
    position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
    gap:14px; padding:14px 30px; background:rgba(8,11,17,.82); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar .crumbs{font-size:12.5px; color:var(--muted)}
  .topbar .crumbs b{color:var(--txt-2); font-weight:600}
  .topbar .gh{font-size:12.5px}
  .menu-btn{display:none; background:var(--panel); border:1px solid var(--line-2); color:var(--txt);
    border-radius:9px; padding:7px 11px; font-size:14px; cursor:pointer}

  article{max-width:880px; margin:0 auto; padding:34px 30px 90px}
  .doc{animation:fade .25s ease}
  @keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}

  /* ---- Markdown typography ---- */
  .doc h1{font-size:30px; line-height:1.2; font-weight:800; margin:.2em 0 .5em; letter-spacing:-.4px}
  .doc h2{font-size:21px; font-weight:700; margin:1.7em 0 .6em; padding-bottom:.3em; border-bottom:1px solid var(--line)}
  .doc h3{font-size:16.5px; font-weight:700; margin:1.4em 0 .5em; color:var(--txt)}
  .doc h4{font-size:14px; font-weight:700; margin:1.2em 0 .4em; color:var(--txt-2); text-transform:uppercase; letter-spacing:.4px}
  .doc h1:first-child,.doc h2:first-child{margin-top:0}
  .doc p{margin:.7em 0; color:var(--txt-2)}
  .doc strong{color:var(--txt); font-weight:700}
  .doc ul,.doc ol{margin:.6em 0; padding-left:1.4em; color:var(--txt-2)}
  .doc li{margin:.32em 0}
  .doc li::marker{color:var(--accent)}
  .doc hr{border:none; border-top:1px solid var(--line); margin:2em 0}
  .doc code{font-family:var(--mono); font-size:.87em; background:var(--panel); border:1px solid var(--line);
    padding:.12em .42em; border-radius:6px; color:var(--accent-bright)}
  .doc pre{background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:15px 17px;
    overflow:auto; margin:1em 0}
  .doc pre code{background:none; border:none; padding:0; color:var(--txt-2); font-size:13px; line-height:1.6}
  .doc blockquote{margin:1.1em 0; padding:.4em 1.1em; border-left:3px solid var(--accent);
    background:var(--accent-soft); border-radius:0 10px 10px 0; color:var(--txt-2)}
  .doc blockquote p{margin:.35em 0}
  .doc a{border-bottom:1px solid transparent}
  .doc a:hover{border-bottom-color:var(--accent-bd); text-decoration:none}

  /* tables */
  .doc .tw{overflow-x:auto; margin:1.2em 0; border:1px solid var(--line); border-radius:12px}
  .doc table{border-collapse:collapse; width:100%; font-size:13.6px}
  .doc thead th{background:var(--head); color:var(--txt); font-weight:700; text-align:left;
    padding:10px 14px; border-bottom:1px solid var(--line-2); white-space:nowrap}
  .doc tbody td{padding:9px 14px; border-bottom:1px solid var(--line); color:var(--txt-2); vertical-align:top}
  .doc tbody tr:last-child td{border-bottom:none}
  .doc tbody tr:hover td{background:var(--panel-2)}

  .loading{color:var(--muted); font-size:14px; padding:40px 0}
  .err{color:var(--bad); background:var(--panel); border:1px solid var(--line-2); border-radius:12px; padding:18px}

  /* ---- Responsive ---- */
  @media (max-width:860px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:20; width:86%; max-width:330px; transform:translateX(-100%);
      transition:transform .22s ease; box-shadow:var(--shadow)}
    body.nav-open .sidebar{transform:none}
    .menu-btn{display:inline-block}
    .scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:15}
    body.nav-open .scrim{display:block}
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="mark">🔗</span>
      <div>
        <h1>Linchpin</h1>
        <span class="sub">Portafolio del Operador</span>
      </div>
    </div>
    <nav class="nav" id="nav"><!-- populated by JS --></nav>
    <div class="side-foot">
      El paquete de incorporación para la persona que opera Linchpin.<br><br>
      <a href="/">← Dashboard</a> · <a href="/console">Consola</a>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menú">☰</button>
      <div class="crumbs">Portafolio del Operador · <b id="crumb">…</b></div>
      <a class="gh" id="ghLink" href="https://github.com/esstipi-debug/linchpin/tree/main/documentation/operator" target="_blank" rel="noopener">Ver en GitHub ↗</a>
    </div>
    <article><div id="content" class="doc"><div class="loading">Cargando…</div></div></article>
    <div class="scrim" id="scrim"></div>
  </main>
</div>

<script src="/static/operator/vendor/marked.min.js"></script>
<script>
(function () {
  "use strict";

  // The 7 portfolio docs, in reading order. `file` is fetched from /operator-docs/.
  var DOCS = [
    { id: "inicio",        file: "README.md",                 n: "·",  label: "Inicio / Índice" },
    { id: "rol",           file: "01_role_charter.md",        n: "01", label: "Carta del Rol" },
    { id: "division",      file: "02_division_of_labor.md",   n: "02", label: "División del Trabajo" },
    { id: "metodologias",  file: "03_methodologies.md",       n: "03", label: "Metodologías" },
    { id: "runbooks",      file: "04_runbooks.md",            n: "04", label: "Runbooks" },
    { id: "catalogo",      file: "05_deliverable_catalog.md", n: "05", label: "Catálogo de Entregables" },
    { id: "competencias",  file: "06_competency_map.md",      n: "06", label: "Mapa de Competencias" }
  ];
  var DOCS_BASE = "/operator-docs/";
  var byFile = {}, byId = {};
  DOCS.forEach(function (d) { byFile[d.file] = d; byId[d.id] = d; });

  var cache = {};
  var elContent = document.getElementById("content");
  var elNav = document.getElementById("nav");
  var elCrumb = document.getElementById("crumb");
  var elGh = document.getElementById("ghLink");

  // GitHub-compatible heading slug, so in-doc anchor links resolve.
  function slug(text) {
    return text.toLowerCase().trim()
      .replace(/[^\p{L}\p{N}\s-]/gu, "")
      .replace(/\s/g, "-");
  }

  marked.setOptions({ gfm: true, breaks: false });

  // Build the sidebar.
  DOCS.forEach(function (d) {
    var a = document.createElement("a");
    a.href = "#" + d.id;
    a.dataset.id = d.id;
    a.innerHTML = '<span class="n">' + d.n + '</span><span>' + d.label + '</span>';
    elNav.appendChild(a);
  });

  function setActive(id) {
    Array.prototype.forEach.call(elNav.children, function (a) {
      a.classList.toggle("active", a.dataset.id === id);
    });
    var d = byId[id];
    elCrumb.textContent = d ? d.label : "…";
    elGh.href = d
      ? "https://github.com/esstipi-debug/linchpin/blob/main/documentation/operator/" + d.file
      : "https://github.com/esstipi-debug/linchpin/tree/main/documentation/operator";
  }

  function enhance(container) {
    // Wrap tables for horizontal scroll on narrow screens.
    Array.prototype.forEach.call(container.querySelectorAll("table"), function (t) {
      if (t.parentElement && t.parentElement.classList.contains("tw")) return;
      var w = document.createElement("div"); w.className = "tw";
      t.parentNode.insertBefore(w, t); w.appendChild(t);
    });
    // Give headings ids for in-page anchors.
    Array.prototype.forEach.call(container.querySelectorAll("h1,h2,h3,h4"), function (h) {
      if (!h.id) h.id = slug(h.textContent);
    });
    // Rewrite links: internal .md -> SPA route; anchors stay; external -> new tab.
    Array.prototype.forEach.call(container.querySelectorAll("a[href]"), function (a) {
      var href = a.getAttribute("href");
      if (!href) return;
      if (/^https?:\/\//i.test(href)) { a.target = "_blank"; a.rel = "noopener"; return; }
      if (href.charAt(0) === "#") return; // in-page anchor, handled below
      // strip any directory + take basename + optional #anchor
      var hash = "", base = href;
      var hi = href.indexOf("#");
      if (hi >= 0) { hash = href.slice(hi); base = href.slice(0, hi); }
      var name = base.split("/").pop();
      if (byFile[name]) {
        a.setAttribute("href", "#" + byFile[name].id + (hash ? "~" + hash.slice(1) : ""));
      } else if (/\.md$/i.test(name)) {
        // a repo doc outside the portfolio -> open it on GitHub
        a.setAttribute("href", "https://github.com/esstipi-debug/linchpin/blob/main/" + base.replace(/^(\.\.\/)+/, ""));
        a.target = "_blank"; a.rel = "noopener";
      }
    });
  }

  function render(id, anchor) {
    var d = byId[id] || DOCS[0];
    setActive(d.id);
    function paint(md) {
      elContent.innerHTML = marked.parse(md);
      enhance(elContent);
      document.querySelector("main").scrollTop = 0;
      if (anchor) {
        var t = document.getElementById(anchor);
        if (t) t.scrollIntoView();
      } else {
        window.scrollTo(0, 0);
      }
    }
    if (cache[d.id]) { paint(cache[d.id]); return; }
    elContent.innerHTML = '<div class="loading">Cargando…</div>';
    fetch(DOCS_BASE + d.file)
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) { cache[d.id] = md; paint(md); })
      .catch(function (e) {
        elContent.innerHTML = '<div class="err">No se pudo cargar <code>' + d.file +
          '</code> (' + e.message + ').<br>Sirve el sitio con <code>uvicorn webapp.app:app</code> y abre <code>/operator</code>.</div>';
      });
  }

  function route() {
    var raw = (location.hash || "#inicio").slice(1);
    // format: id  or  id~anchor
    var parts = raw.split("~");
    var id = parts[0] || "inicio";
    if (!byId[id]) id = "inicio";
    render(id, parts[1]);
    closeNav();
  }

  // Intercept in-page anchor clicks (delegated) so they don't change the route.
  elContent.addEventListener("click", function (e) {
    var a = e.target.closest && e.target.closest('a[href^="#"]');
    if (!a) return;
    var href = a.getAttribute("href");
    if (href.indexOf("~") >= 0 || !document.getElementById(href.slice(1))) return; // let router handle cross-doc
    e.preventDefault();
    var t = document.getElementById(href.slice(1));
    if (t) t.scrollIntoView();
  });

  // Mobile nav
  function closeNav() { document.body.classList.remove("nav-open"); }
  document.getElementById("menuBtn").addEventListener("click", function () {
    document.body.classList.toggle("nav-open");
  });
  document.getElementById("scrim").addEventListener("click", closeNav);

  window.addEventListener("hashchange", route);
  route();
})();
</script>
</body>
</html>
